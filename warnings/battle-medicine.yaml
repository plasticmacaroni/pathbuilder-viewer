title: Battle Medicine
description: Emergency healing option
checkFunction: |
  function() {
    if (characters.length === 0) return true;

    // Check if any character has Battle Medicine
    let hasBattleMedicine = false;
    for (const character of characters) {
      if (character.extracted && character.extracted.healingAbilities) {
        for (const ability of character.extracted.healingAbilities) {
          if (ability === "Battle Medicine") {
            hasBattleMedicine = true;
            break;
          }
        }
      }
      if (hasBattleMedicine) break;
    }

    if (hasBattleMedicine) {
      window.battleMedicineSummary = "At least one character has Battle Medicine for emergency healing.";
      return true;
    }

    // Low-level grace: skill feats are scarce at levels 1-2, so stay green with a nudge
    const avgLevel = characters.reduce((a, c) => a + (c.build?.level || 0), 0) / characters.length;
    if (avgLevel < 3) {
      window.battleMedicineSummary = "No Battle Medicine yet — forgivable below level 3 while skill feats are scarce, but someone trained in Medicine should pick it up soon: it's the only healing that costs neither a spell slot nor 10 minutes.";
      return true;
    }

    return false;
  }
successMessage: "{{battleMedicineSummary}}"
failureMessage: No character has Battle Medicine for emergency healing. It's the only in-combat healing that costs neither a spell slot nor 10 minutes — one Medicine-trained character should take it.
