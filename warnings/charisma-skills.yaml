title: Make Sure You Have a Face!
description: Party lacks charisma skill proficiencies
checkFunction: |
  function() {
    if (characters.length === 0) return true;

    const charismaSkills = {
      'deception': 'Deception', 'diplomacy': 'Diplomacy',
      'intimidation': 'Intimidation', 'performance': 'Performance'
    };

    const missingSkills = [];
    const coveredLines = [];

    const rankWord = { T: 'trained', E: 'expert', M: 'master', L: 'legendary' };
    for (const [skillKey, skillName] of Object.entries(charismaSkills)) {
      const carriers = characters
        .filter(c => (c.extracted?.skillProficiencies?.[skillKey] ?? 'U') !== 'U')
        .map(c => (c.build?.name || 'Unknown') + ' (' + (rankWord[c.extracted.skillProficiencies[skillKey]] || c.extracted.skillProficiencies[skillKey]) + ')');
      if (carriers.length > 0) coveredLines.push(skillName + ': ' + carriers.join(', '));
      else missingSkills.push(skillName);
    }

    window.missingCharismaSkills = missingSkills;
    const hasPerformance = !missingSkills.includes('Performance');
    const hasSocialSkills = missingSkills.length < 3;
    window.onlyHasPerformance = hasPerformance && !hasSocialSkills;

    window.charismaSummary = "Your party has good coverage of social skills." +
      (window.onlyHasPerformance ? " Though Performance is less useful than the other Charisma skills in most adventures." : "") +
      (coveredLines.length ? "||Covered: | " + coveredLines.join(' | ') : "") +
      (missingSkills.length ? "||Untrained: | " + missingSkills.join(' | ') : "");

    return hasSocialSkills;
  }
successMessage: "{{charismaSummary}}"
failureMessage: "Your party lacks proficiency in important social skills.||Missing: | {{missingCharismaSkills.join(' | ')}}||Consider training in Diplomacy, Deception, or Intimidation to help with social encounters."
