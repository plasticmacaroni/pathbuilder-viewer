title: Skill Coverage
description: Party skill proficiency distribution
checkFunction: |
  function() {
    if (characters.length === 0) return true;

    const allSkills = {
      'acrobatics': 'Acrobatics', 'arcana': 'Arcana', 'athletics': 'Athletics',
      'crafting': 'Crafting', 'deception': 'Deception', 'diplomacy': 'Diplomacy',
      'intimidation': 'Intimidation', 'medicine': 'Medicine', 'nature': 'Nature',
      'occultism': 'Occultism', 'performance': 'Performance', 'religion': 'Religion',
      'society': 'Society', 'stealth': 'Stealth', 'survival': 'Survival', 'thievery': 'Thievery'
    };

    const prof = (c, key) => c.extracted?.skillProficiencies?.[key] ?? 'U';
    const insufficientSkills = [];
    const notes = [];

    for (const [skillKey, skillName] of Object.entries(allSkills)) {
      let covered = characters.some(c => prof(c, skillKey) !== 'U');

      // Chirurgeon exception: an alchemist with the Chirurgeon research field uses
      // Crafting in place of Medicine for its checks
      if (!covered && skillKey === 'medicine') {
        const chirurgeons = characters.filter(c =>
          (c.build?.specials || []).some(s => String(s).toLowerCase() === 'chirurgeon') &&
          prof(c, 'crafting') !== 'U'
        ).map(c => c.build?.name || 'Unknown');
        if (chirurgeons.length > 0) {
          covered = true;
          notes.push('Medicine: no one is trained, but ' + chirurgeons.join(', ') + ' covers it via Chirurgeon (uses Crafting for Medicine checks)');
        }
      }

      if (!covered) insufficientSkills.push(skillName);
    }

    window.insufficientSkillsList = insufficientSkills;
    window.skillCoverageSummary = "Full skill coverage — at least one character is trained in every skill (the table above shows who)." +
      (notes.length ? "||Notes: | " + notes.join(' | ') : "");
    return insufficientSkills.length === 0;
  }
successMessage: "{{skillCoverageSummary}}"
failureMessage: "Nobody in the party is trained in these skills.||Missing: | {{insufficientSkillsList.join(' | ')}}"
