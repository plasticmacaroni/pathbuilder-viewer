title: "Character Level Consistency"
checkFunction: "function() {
    if (characters.length <= 1) {
      window.partyLevel = characters[0]?.build?.level ?? '?';
      return true;
    }

    const firstLevel = characters[0].build.level;
    window.partyLevel = firstLevel;
    window.levelSpread = characters.map(c => (c.build?.name || 'Unknown') + ' (' + (c.build?.level ?? '?') + ')').join(', ');
    return characters.every(char => char.build.level === firstLevel);
}"
successMessage: "All characters are at the same level (Level {{partyLevel}})."
failureMessage: "Characters have different levels! This can cause imbalance in party comparison: {{levelSpread}}. Consider exporting all characters at the same level."