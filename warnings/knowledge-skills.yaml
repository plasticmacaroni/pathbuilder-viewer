title: Dumb AND Hot!
description: Party lacks knowledge skill proficiencies
checkFunction: |
  function() {
    if (characters.length === 0) return true;

    const knowledgeSkills = {
      'arcana': 'Arcana', 'occultism': 'Occultism', 'religion': 'Religion',
      'nature': 'Nature', 'society': 'Society', 'crafting': 'Crafting'
    };

    const missingSkills = [];
    const coveredLines = [];

    const rankWord = { T: 'trained', E: 'expert', M: 'master', L: 'legendary' };
    for (const [skillKey, skillName] of Object.entries(knowledgeSkills)) {
      const carriers = characters
        .filter(c => (c.extracted?.skillProficiencies?.[skillKey] ?? 'U') !== 'U')
        .map(c => (c.build?.name || 'Unknown') + ' (' + (rankWord[c.extracted.skillProficiencies[skillKey]] || c.extracted.skillProficiencies[skillKey]) + ')');
      if (carriers.length > 0) coveredLines.push(skillName + ': ' + carriers.join(', '));
      else missingSkills.push(skillName);
    }

    window.missingKnowledgeSkills = missingSkills;
    const coveragePercent = Math.round(((6 - missingSkills.length) / 6) * 100);
    window.knowledgeCoveragePercent = coveragePercent;

    window.knowledgeSummary = "Recall Knowledge — identifying monsters and their weaknesses — runs on these six skills. Your party has good coverage (" + coveragePercent + "%)." +
      (coveredLines.length ? "||Covered: | " + coveredLines.join(' | ') : "") +
      (missingSkills.length ? "||Still missing: | " + missingSkills.join(' | ') : "");

    return coveragePercent >= 66;
  }
successMessage: "{{knowledgeSummary}}"
failureMessage: "Your party lacks proficiency in crucial knowledge skills.||Missing: | {{missingKnowledgeSkills.join(' | ')}}||Consider training in these skills to help identify monsters, recall lore, and craft items."
