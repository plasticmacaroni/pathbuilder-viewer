title: Not All Magic Shows Up On Your Radar
description: Checks if at least one character has the Detect Magic cantrip
checkFunction: |
  function() {
    if (characters.length === 0) return true;

    const carriers = [];
    for (const c of characters) {
      const name = c.build?.name || 'Unknown';
      const spells = new Set();
      for (const caster of (c.build?.spellCasters || [])) {
        for (const lg of [caster.spells, caster.prepared].filter(Boolean)) {
          for (const ld of lg) (ld.list || []).forEach(s => spells.add(String(s)));
        }
      }
      const legacy = c.build?.spells || {};
      for (const lvl in legacy) {
        const list = legacy[lvl];
        if (Array.isArray(list)) list.forEach(s => spells.add(typeof s === 'string' ? s : (s?.name || s?.[0] || '')));
      }

      for (const s of spells) {
        if (s.toLowerCase().includes('detect magic')) { carriers.push(name + ' (Detect Magic)'); break; }
      }
      if ((c.build?.specials || []).some(sp => String(sp).toLowerCase().includes('arcane sense'))) {
        carriers.push(name + ' (Arcane Sense)');
      }
    }

    window.detectMagicCarriers = carriers;
    return carriers.length > 0;
  }
successMessage: "Detect Magic is covered — invaluable for finding magic items, illusions, and magical hazards.||Carriers: | {{detectMagicCarriers.join(' | ')}}"
failureMessage: No character in your party can cast Detect Magic. This cantrip is invaluable for identifying magic items, detecting illusions, and investigating magical phenomena.
