title: Maybe Try Knocking?
description: Trained-in-Thievery characters need thieves' tools
checkFunction: |
  function() {
    if (characters.length === 0) return true;

    const hasThievery = (c) => {
      if (c.proficiencies && c.proficiencies.thievery >= 2) return true;
      const prof = c.extracted?.skillProficiencies?.thievery;
      if (prof && prof !== 'U') return true;
      const direct = c.build?.proficiencies?.thievery;
      if (typeof direct === 'number' && direct >= 2) return true;
      return false;
    };

    const hasTools = (c) => {
      const sources = [c.equipment, c.build?.equipment].filter(Boolean);
      for (const eq of sources) {
        for (const item of eq) {
          const itemName = String(Array.isArray(item) ? item[0] : (item?.name || item) || '').toLowerCase();
          if (itemName.includes('thieve') && itemName.includes('tool')) return true;
        }
      }
      return false;
    };

    const trained = characters.filter(hasThievery);
    const trainedNoTools = trained.filter(c => !hasTools(c)).map(c => c.build?.name || 'Unknown');
    const trainedWithTools = trained.filter(hasTools).map(c => (c.build?.name || 'Unknown') + " (thieves' tools)");

    window.thievesToolsMissing = trainedNoTools;
    if (trained.length === 0) {
      window.thieverySummary = "Green by default — no one in the party is trained in Thievery, so nobody needs the kit. (Worth noting: nobody can pick locks either.)";
    } else {
      window.thieverySummary = "Thievery-trained characters have their kit — locks and traps handled.||Equipped: | " + trainedWithTools.join(' | ');
    }
    return trainedNoTools.length === 0;
  }
successMessage: "{{thieverySummary}}"
failureMessage: "These characters are trained in Thievery but carry no thieves' tools — that's a -2 on Pick Lock, and some locks can't be opened at all without the kit.||Missing the kit: | {{thievesToolsMissing.join(' | ')}}||Buy one. It's 3 gp."
