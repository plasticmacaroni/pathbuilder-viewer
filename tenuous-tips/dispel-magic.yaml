title: No Dispelling Troubles
description: Checks if any character actually has Dispel Magic prepared/known and recommends eligible casters if not
checkFunction: |
  function() {
    if (characters.length === 0) return true;

    const carriers = new Set();
    const eligible = new Set();

    const collectSpells = (c) => {
      const spells = new Set();
      for (const caster of (c.build?.spellCasters || [])) {
        for (const lg of [caster.prepared, caster.spells].filter(Boolean)) {
          for (const ld of lg) (ld.list || []).forEach(s => spells.add(s));
        }
      }
      for (const lvl in (c.build?.spellsKnown || {})) {
        (c.build.spellsKnown[lvl] || []).forEach(s => spells.add(s));
      }
      // Also legacy: build.spells map
      const legacy = c.build?.spells || {};
      for (const lvl in legacy) {
        const list = legacy[lvl];
        if (Array.isArray(list)) list.forEach(s => spells.add(typeof s === 'string' ? s : (s.name || s[0] || '')));
      }
      return spells;
    };

    // Anyone with any spellcasting tradition is "eligible" to learn Dispel Magic
    const isSpellcaster = (c) => {
      if (Array.isArray(c.build?.spellCasters) && c.build.spellCasters.length > 0) return true;
      const cls = c.build?.class || '';
      const casterClasses = new Set(['Wizard', 'Cleric', 'Druid', 'Sorcerer', 'Witch', 'Bard', 'Oracle', 'Magus', 'Summoner', 'Animist', 'Psychic']);
      return casterClasses.has(cls);
    };

    for (const c of characters) {
      const name = c.build?.name || 'Unknown';
      const spells = collectSpells(c);

      let has = false;
      for (const s of spells) {
        if (/dispel magic/i.test(s || '')) { has = true; break; }
      }
      if (has) {
        carriers.add(name);
        continue;
      }
      if (isSpellcaster(c) && (c.build?.level || 0) >= 3) {
        eligible.add(name);
      }
    }

    window.dispelCarriers = Array.from(carriers).join(', ');
    window.dispelEligible = eligible.size ? Array.from(eligible).join(', ') : 'nobody — no level-3+ caster in the party';
    return carriers.size > 0;
  }
successMessage: "Dispel Magic is on someone's spell list — curses, summoned creatures, and magical hazards can be peeled off. Carriers: {{dispelCarriers}}."
failureMessage: "No one in the party has Dispel Magic prepared or known. It's essential for stripping curses, ending summons, and shutting down magical traps. Eligible casters (level 3+) who could pick it up: {{dispelEligible}}."
