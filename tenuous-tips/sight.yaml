title: Darkness Ahead
description: Party may struggle with light sources in dark environments
checkFunction: |
  function() {
    if (characters.length === 0) return true;

    const lightSpells = ['light', 'dancing lights', 'floating flame', 'everlight'];
    const lightItems = ['torch', 'lantern', 'everburning', 'sunrod', 'glow rod', 'moonlit chain'];
    const sources = [];

    for (const c of characters) {
      const name = c.build?.name || 'Unknown';
      const mine = [];

      const specials = (c.build?.specials || []).map(s => String(s).toLowerCase());
      if (specials.some(s => s.includes('darkvision'))) mine.push('darkvision');
      else if (specials.some(s => s.includes('low-light'))) mine.push('low-light vision');

      for (const fam of (c.build?.familiars || [])) {
        if ((fam.abilities || []).some(a => String(a).toLowerCase().includes('darkvision'))) mine.push('familiar with darkvision');
      }

      const spells = new Set();
      for (const caster of (c.build?.spellCasters || [])) {
        for (const lg of [caster.spells, caster.prepared].filter(Boolean)) {
          for (const ld of lg) (ld.list || []).forEach(s => spells.add(String(s)));
        }
      }
      for (const s of spells) {
        if (lightSpells.some(h => s.toLowerCase().includes(h))) mine.push(s + ' (spell)');
      }

      for (const item of (c.build?.equipment || [])) {
        const n = String((Array.isArray(item) ? item[0] : (item?.name || item?.display || item)) || '');
        if (lightItems.some(h => n.toLowerCase().includes(h))) mine.push(n + ' (item)');
      }

      if (mine.length) sources.push(name + ': ' + mine.join(', '));
    }

    window.lightSources = sources;
    window.sightSummary = "Dungeons are dark, and fighting blind means a flat check on every attack. Your party can handle it.||Vision & light: | " + sources.join(' | ');
    return sources.length > 0;
  }
successMessage: "{{sightSummary}}"
failureMessage: No one in your party has darkvision, light spells, or even a torch. Remember that a torch or lantern occupies a hand, which limits combat options. Consider the Light cantrip, a familiar with darkvision, or at minimum some torches.
