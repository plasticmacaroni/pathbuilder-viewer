title: Awh, Too Poor?
description: Checks party access to silver, cold iron, and adamantine for bypassing creature weaknesses
checkFunction: |
  function() {
    if (characters.length === 0) return true;

    const avgLevel = characters.reduce((a, c) => a + (c.build?.level || 0), 0) / characters.length;
    if (avgLevel < 1 || avgLevel > 20) return true;

    const materials = [
      { key: 'silver',     label: 'Silver',     minLevel: 1, why: 'werewolves and other lycanthropes resist non-silver weapons' },
      { key: 'cold iron',  label: 'Cold Iron',  minLevel: 3, why: 'fey, redcaps, and demons resist non-cold-iron weapons — a low-grade cold iron weapon is a level-2 item (40 gp, realistic by level 3) and lesser cold iron blanch (item 3, 10 gp) is a cheap consumable stopgap' },
      { key: 'adamantine', label: 'Adamantine', minLevel: 8, why: 'golems, constructs, and hardness-heavy enemies require adamantine to bypass' }
    ];
    const adamantineAliases = /adamantine|adamantium/i;
    // material -> Map(characterName -> [source, source...]) so each character lists once
    const carriers = { silver: new Map(), 'cold iron': new Map(), adamantine: new Map() };
    const addSource = (material, who, source) => {
      if (!carriers[material].has(who)) carriers[material].set(who, []);
      if (!carriers[material].get(who).includes(source)) carriers[material].get(who).push(source);
    };

    for (const c of characters) {
      const name = c.build?.name || 'Unknown';
      const sources = [
        ...(c.build?.weapons || []),
        ...(c.build?.equipment || [])
      ];

      for (const item of sources) {
        const itemName = String((Array.isArray(item) ? item[0] : (item?.name || item?.display || item)) || '');
        const lower = itemName.toLowerCase();
        if (lower.includes('silver')) addSource('silver', name, itemName);
        if (lower.includes('cold iron')) addSource('cold iron', name, itemName);
        if (adamantineAliases.test(itemName)) addSource('adamantine', name, itemName);
      }

      // Needle Darts: caster can produce silver damage natively (cast with silver coins as ammo)
      let hasNeedleDarts = false;
      for (const caster of (c.build?.spellCasters || [])) {
        const groups = [caster.prepared, caster.spells].filter(Boolean);
        for (const levelGroup of groups) {
          for (const levelData of levelGroup) {
            if ((levelData.list || []).some(s => /needle darts/i.test(s || ''))) hasNeedleDarts = true;
          }
        }
      }
      const known = c.build?.spellsKnown || {};
      for (const lvl in known) {
        if ((known[lvl] || []).some(s => /needle darts/i.test(s || ''))) hasNeedleDarts = true;
      }
      if (hasNeedleDarts) {
        addSource('silver', name, 'Needle Darts cast with silver coins');
        // A cold iron chunk (10 gp, light Bulk) works as Needle Darts material too
        const hasChunk = sources.some(item => {
          const n = String((Array.isArray(item) ? item[0] : (item?.name || item?.display || item)) || '').toLowerCase();
          return n.includes('cold iron') && (n.includes('chunk') || n.includes('ingot') || n.includes('coin'));
        });
        if (hasChunk) addSource('cold iron', name, 'Needle Darts with a cold iron chunk');
      }
    }

    const coveredLines = [];
    const gaps = [];
    const upcoming = [];

    for (const m of materials) {
      const entries = Array.from(carriers[m.key].entries());
      const gated = avgLevel < m.minLevel;
      if (entries.length > 0) {
        const list = entries.map(([who, sources]) => `${who} (${sources.join('; ')})`);
        coveredLines.push(`${m.label} covered by ${list.join(', ')}`);
      } else if (!gated) {
        gaps.push(`${m.label} — ${m.why}`);
      } else {
        // Not counted against the party yet, but shown as an upcoming need
        upcoming.push(`${m.label} (by level ${m.minLevel}) — ${m.why}`);
      }
    }

    const coveredBlock = "||Covered: | " + (coveredLines.length ? coveredLines.join(' | ') : 'nothing');
    const upcomingBlock = upcoming.length ? "||Soon needed: | " + upcoming.join(' | ') : "";
    const fixesBlock = "||Cheapest fixes: a 10 gp metal chunk for a Needle Darts caster, a 10 gp cold iron blanch (item 3) for a martial, or a 40 gp low-grade weapon.";

    window.tooPoorSummary = "Your party can bypass the material-based resistances relevant at your level." + coveredBlock + upcomingBlock;
    window.tooPoorFailSummary = "Some monsters resist anything but specific weapon materials.||Missing: | " + gaps.join(' | ') + coveredBlock + upcomingBlock + fixesBlock;

    return gaps.length === 0;
  }
successMessage: "{{tooPoorSummary}}"
failureMessage: "{{tooPoorFailSummary}}"
