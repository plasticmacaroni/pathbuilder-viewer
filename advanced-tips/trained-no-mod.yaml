title: Trained but Mid
description: Flags skills that are trained on a dump stat (ability modifier ≤ 0)
checkFunction: |
  function() {
    if (characters.length === 0) return true;

    const abilityModifier = (score) => Math.floor((Number(score || 10) - 10) / 2);
    const skillAbility = {
      acrobatics: 'dex', arcana: 'int', athletics: 'str', crafting: 'int',
      deception: 'cha', diplomacy: 'cha', intimidation: 'cha', medicine: 'wis',
      nature: 'wis', occultism: 'int', performance: 'cha', religion: 'wis',
      society: 'int', stealth: 'dex', survival: 'wis', thievery: 'dex'
    };

    // Group offending skills per character so the output reads as one list row each
    const perCharacter = new Map();

    for (const c of characters) {
      const name = c.build?.name || 'Unknown';
      const profs = c.build?.proficiencies || {};
      const abilities = c.build?.abilities || {};

      for (const [skill, abil] of Object.entries(skillAbility)) {
        const profValue = Number(profs[skill] || 0);
        if (profValue <= 0) continue;
        const mod = abilityModifier(abilities[abil]);
        if (mod <= 0) {
          const sign = mod >= 0 ? '+' : '';
          if (!perCharacter.has(name)) perCharacter.set(name, []);
          perCharacter.get(name).push(`${skill[0].toUpperCase() + skill.slice(1)} (${abil.toUpperCase()} ${sign}${mod})`);
        }
      }
    }

    const offenders = Array.from(perCharacter.entries()).map(([who, skills]) => `${who}: ${skills.join(', ')}`);
    window.trainedNoModList = offenders;
    return offenders.length === 0;
  }
successMessage: "Every trained skill in your party is backed by an ability score of at least 12, so the training is actually adding to the bonus. No wasted skill investments."
failureMessage: "Training a skill on a dump-stat ability means the bonus barely moves above untrained — the level + proficiency stacks, but the ability modifier drags it down.||Wasted training: | {{trainedNoModList.join(' | ')}}||Consider retraining the skill or boosting the underlying ability score."
