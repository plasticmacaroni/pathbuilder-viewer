title: Reaction Time
description: Checks that every character has at least one reaction ability for combat depth
checkFunction: |
  function() {
    if (characters.length === 0) return true;

    const reactionFeats = [
      'Reactive Strike',
      'Attack of Opportunity',
      'Stand Still',
      'No Escape',
      "You're Next",
      'Shield Block',
      'Nimble Dodge',
      'Reactive Shield',
      'Cover-Up'
    ];

    const withReactions = [];
    const without = [];

    for (const c of characters) {
      const name = c.build?.name || 'Unknown';
      const feats = c.build?.feats || [];

      const matched = feats
        .map(f => Array.isArray(f) ? f[0] : f)
        .filter(featName => reactionFeats.includes(featName));

      if (matched.length > 0) withReactions.push(`${name} (${matched.join(', ')})`);
      else without.push(name);
    }

    window.reactionEquipped = withReactions.length ? withReactions.join(' | ') : 'nobody';
    window.reactionMissing = without;

    // Below level 3, missing reactions is normal — several classes literally can't
    // take one at level 1, and most pick one up between levels 2 and 4.
    const avgLevel = characters.reduce((a, c) => a + (c.build?.level || 0), 0) / characters.length;
    if (without.length > 0 && avgLevel < 3) {
      window.reactionSummary = "Low levels get a pass — several classes can't even take a reaction at level 1, and most pick one up by level 2-4. Revisit around level 3.||Without one: | " + without.join(' | ') + (withReactions.length ? "||Equipped: | " + window.reactionEquipped : "");
      return true;
    }

    window.reactionSummary = "Every character has a reaction ability, so the party can punish enemy movement, block hits, and dodge attacks.||Equipped: | " + window.reactionEquipped;
    return without.length === 0;
  }
successMessage: "{{reactionSummary}}"
failureMessage: "Reactions are how characters interact with enemy turns — stopping movement (Reactive Strike, Stand Still), absorbing hits (Shield Block, Nimble Dodge), or chaining attacks (You're Next). Without one, a character is a passive bystander on enemy turns.||No reaction: | {{reactionMissing.join(' | ')}}||Equipped: | {{reactionEquipped}}"
