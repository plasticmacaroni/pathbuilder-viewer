title: Rock, Paper, Scissors
description: Coverage of bludgeoning, slashing, and piercing physical damage
checkFunction: |
  function() {
    if (characters.length === 0) return true;

    const targets = {
      bludgeoning: { label: 'Bludgeoning', why: 'skeletons resist piercing/slashing — and many oozes too' },
      slashing:    { label: 'Slashing',    why: 'best against plants and many beasts' },
      piercing:    { label: 'Piercing',    why: 'best at ranged and against some armored foes' }
    };

    const weaponDamage = (name) => {
      const n = String(name || '').toLowerCase();
      const types = new Set();
      if (/(mace|club|hammer|sap|staff|maul|morningstar|warhammer|flail|sling|bo staff|nunchaku)/.test(n)) types.add('bludgeoning');
      if (/(sword|scimitar|falchion|axe|sickle|kukri|machete|katar|glaive|halberd|scythe)/.test(n)) types.add('slashing');
      if (/(dagger|spear|pick|rapier|stiletto|bow|crossbow|dart|javelin|lance|arrow|trident|shuriken)/.test(n)) types.add('piercing');
      // common versatile weapons cover their secondary type too
      if (/dagger/.test(n)) types.add('slashing');                        // dagger: P, versatile S
      if (/(bastard sword|longsword)/.test(n)) types.add('piercing');     // longswords: S, versatile P
      return types;
    };

    // Pathbuilder exports declare damageType as a letter code
    const letterMap = { b: 'bludgeoning', p: 'piercing', s: 'slashing' };

    const carriers = { bludgeoning: new Set(), slashing: new Set(), piercing: new Set() };

    for (const c of characters) {
      const name = c.build?.name || 'Unknown';

      // Everyone has fists — bludgeoning is always available (RAW unarmed attack)
      carriers.bludgeoning.add(`${name} (fist)`);

      // Scan weapons AND equipment — some exports only list weapons under equipment
      const sources = [...(c.build?.weapons || []), ...(c.build?.equipment || [])];
      for (const w of sources) {
        const wname = (Array.isArray(w) ? w[0] : (w?.name || w?.display || w)) || '';
        const declaredRaw = String(w?.damageType || w?.damage_type || w?.dmgType || '').toLowerCase();
        const declared = targets[declaredRaw] ? declaredRaw : letterMap[declaredRaw];
        if (declared) carriers[declared].add(`${name} (${wname})`);
        for (const t of weaponDamage(wname)) carriers[t].add(`${name} (${wname})`);
      }
    }

    const coveredLines = [];
    const gaps = [];
    for (const key of Object.keys(targets)) {
      const list = Array.from(carriers[key]);
      if (list.length > 0) coveredLines.push(`${targets[key].label} via ${list.join(', ')}`);
      else gaps.push(`${targets[key].label} — ${targets[key].why}`);
    }

    window.rpsCovered = coveredLines.length ? coveredLines.join(' | ') : 'nothing';
    window.rpsGaps = gaps;
    return gaps.length === 0;
  }
successMessage: "Your party can deal all three physical damage types, so you can swap weapons to bypass enemy resistances.||Covered: | {{rpsCovered}}"
failureMessage: "Enemies frequently resist one physical damage type.||Missing: | {{rpsGaps.join(' | ')}}||Covered: | {{rpsCovered}}||Have someone keep a backup weapon in the missing type."
